meta:
  name: "zsign"
  version: "0.9.7"
  description: "It might be the quickest cross-platform codesign alternative for iOS 12+"
  license: "MIT"
  homepage: "https://github.com/zhlynn/zsign"
  category: "security"

deps:
  build:
    - gnumake
    - pkgconf
  run:
    - openssl_3
    - minizip

src:
  fetch:
    sha256: "2ba8b61369c0a6dd370c04ca51f65ad2e8fe2b6a8fcbc82656f30e3be97a6e17"
    url: "https://github.com/zhlynn/zsign/archive/refs/tags/v0.9.7.tar.gz"

build:
  system: shell
  run: |
    cd build/macos
    make
    mkdir -p ${DESTDIR}${PREFIX}/bin
    cp ../../bin/zsign ${DESTDIR}${PREFIX}/bin/zsign
    chmod 755 ${DESTDIR}${PREFIX}/bin/zsign
