meta:
  name: "isl"
  version: "0.27"
  description: "Integer Set Library"
  license: "MIT"
  homepage: "https://libisl.github.io/"
  category: "developer"

deps:
  build:
    - gnumake
  run:
    - gmp

src:
  fetch:
    sha256: "6d8babb59e7b672e8cb7870e874f3f7b813b6e00e6af3f8b04f7579965643d5c"
    url: "https://libisl.sourceforge.io/isl-0.27.tar.xz"
    mirrors:
      - "https://ftpmirror.gnu.org/gnu/isl/isl-0.27.tar.xz"

build:
  system: shell
  run: |
    ./configure \
      --prefix=${PREFIX} \
      --disable-dependency-tracking \
      --disable-silent-rules \
      --with-gmp=system \
      --with-gmp-prefix=${PREFIX}
    make
    make install DESTDIR=${DESTDIR}
