meta:
  name: "palera1n"
  version: "2.2.1"
  description: "Jailbreak for A8 through A11, T2 devices, on iOS/iPadOS/tvOS 15.0, bridgeOS 5.0 and higher"
  license: "MIT"
  homepage: "https://palera.in/"
  category: "usb"

src:
  fetch:
    sha256: "39dea3bf92d0a3031c3c050475987c930b4c2feb972e9dcc3e37e5c8844d69f0"
    url: "https://github.com/palera1n/palera1n/releases/download/v2.2.1/palera1n-macos-universal"

build:
  system: shell
  run: |
    mkdir -p ${DESTDIR}${PREFIX}/bin
    install -m755 ${SRCDIR}/palera1n-macos-universal ${DESTDIR}${PREFIX}/bin/palera1n
