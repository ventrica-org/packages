meta:
  name: "berkeley-db"
  version: "18.1.40"
  description: "High-performance embedded database library"
  license: "AGPL-3.0-only"
  homepage: "https://www.oracle.com/database/technologies/related/berkeleydb.html"
  category: "libraries"

deps:
  build:
    - gnumake
  run:
    - openssl_3

src:
  fetch:
    sha256: "0cecb2ef0c67b166de93732769abdeba0555086d51de1090df325e18ee8da9c8"
    url: "https://download.oracle.com/berkeley-db/db-18.1.40.tar.gz"

build:
  system: autotools
  working_dir: "build_unix"
  configure_script: "../dist/configure"
  configure_args:
    - "--prefix=${PREFIX}"
  install_args:
    - "DOCLIST=license"