meta:
  name: "tree"
  version: "2.3.2"
  description: "A recursive directory listing program"
  license: "GPL-2.0-or-later"
  homepage: "https://mama.indstate.edu/users/ice/tree/"
  category: "developer"

src:
  fetch:
    sha256: "22cf32e84e3eb508d97a9e991c2c3cc006b9dcf4afed201d96311c5c57d08fcf"
    url: "https://github.com/Old-Man-Programmer/tree/archive/refs/tags/2.3.2.tar.gz"

build:
  system: shell
  run: |
    make PREFIX=${PREFIX} MANDIR=${PREFIX}/share/man
    make install DESTDIR=${DESTDIR}${PREFIX}/bin MANDIR=${DESTDIR}${PREFIX}/share/man
