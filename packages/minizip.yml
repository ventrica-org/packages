meta:
  name: "minizip"
  version: "1.3.2"
  description: "C library for zip/unzip via zLib"
  license: "Zlib"
  homepage: "https://www.winimage.com/zLibDll/minizip.html"
  category: "libraries"

deps:
  build:
    - automake
    - autoconf
    - libtool
    - gnumake

src:
  fetch:
    sha256: "bb329a0a2cd0274d05519d61c667c062e06990d72e125ee2dfa8de64f0119d16"
    url: "https://zlib.net/zlib-1.3.2.tar.gz"

build:
  system: autotools
  working_dir: "contrib/minizip"
  pre_configure: "autoreconf --force --install --verbose"
  configure_args:
    - "--prefix=${prefix}"
  post_install: "cp ${srcdir}/ints.h ${destdir}${prefix}/include/minizip/"
