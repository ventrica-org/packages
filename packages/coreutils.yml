meta:
  name: "coreutils"
  version: "9.10"
  description: "GNU Core Utilities"
  license: "GPL-3.0"
  icon: "https://www.gnu.org/software/coreutils/coreutils.png"
  homepage: "https://www.gnu.org/software/coreutils/"
  category: "developer"

deps:
  build:
    - gnumake
  run:
    - gmp

src:
  fetch:
    sha256: "16535a9adf0b10037364e2d612aad3d9f4eca3a344949ced74d12faf4bd51d25"
    url: "https://ftp.gnu.org/pub/gnu/coreutils/coreutils-9.10.tar.xz"
    mirrors:
      - "https://ftpmirror.gnu.org/gnu/coreutils/coreutils-9.10.tar.xz"

build:
  system: autotools
  configure_args:
    - "--prefix=${PREFIX}"
    - "--with-libgmp"
    - "--without-selinux"
