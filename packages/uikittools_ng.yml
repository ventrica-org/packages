meta:
  name: "uikittools-ng"
  version: "2.1.7"
  description: "Next-gen uikittools for iOS 11+ (though probably will work on 9+)"
  license: "BSD-3-Clause"
  homepage: "https://github.com/ProcursusTeam/uikittools-ng"
  category: "developer"

deps:
  build:
    - gnumake

src:
  fetch:
    sha256: "9ecefda084a61cfe8925c2f21c4ad603c02577749a06a6da523ff8d9c6806916"
    url: "https://github.com/ProcursusTeam/uikittools-ng/archive/refs/tags/v2.1.7.tar.gz"

build:
  env:
    LDID: "true"
  system: shell
  run: |
    make
    make install DESTDIR=${DESTDIR} PREFIX=${PREFIX}
