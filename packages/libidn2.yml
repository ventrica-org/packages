meta:
  name: "libidn2"
  version: "2.3.8"
  description: "Internationalized Domain Names for Applications (IDNA2008)"
  license: "LGPL-2.1+"
  homepage: "https://www.gnu.org/software/libidn/"
  category: "developer"

deps:
  build:
    - gnumake
    - pkgconf
  run:
    - libunistring

src:
  fetch:
    sha256: "f557911bf6171621e1f72ff35f5b1825bb35b52ed45325dcdee931e5d3c0787a"
    url: "https://ftp.gnu.org/gnu/libidn/libidn2-2.3.8.tar.gz"
    mirrors:
      - "https://ftpmirror.gnu.org/gnu/libidn/libidn2-2.3.8.tar.gz"
      - "http://ftp.gnu.org/gnu/libidn/libidn2-2.3.8.tar.gz"

build:
  system: shell
  run: |
    ./configure \
      --prefix=${PREFIX} \
      --disable-silent-rules
    make
    make install DESTDIR=${DESTDIR}
