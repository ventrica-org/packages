meta:
  name: "gnumake"
  version: "4.4.1"
  description: "GNU make build automation tool"
  license: "GPL-3.0"
  homepage: "https://www.gnu.org/software/make/"
  category: "developer"

src:
  fetch:
    sha256: "8814ba072182b605d156d7589c19a43b89fc58ea479b9355146160946f8cf6e9"
    url: "https://ftp.gnu.org/gnu/make/make-4.4.1.tar.lz"
    mirrors:
      - "https://ftpmirror.gnu.org/gnu/make/make-4.4.1.tar.lz"

build:
  system: autotools
  configure_args:
    - "--prefix=${prefix}"
    - "--disable-dependency-tracking"
  links:
    - bin/gmake: "make"