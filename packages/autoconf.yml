meta:
  name: "autoconf"
  version: "2.72"
  description: "Tool for automatically generating configure scripts"
  license: "GPL-3.0-or-later"
  homepage: "https://www.gnu.org/software/autoconf/"
  category: "developer"

deps:
  build:
    - m4
    - gnumake
    # - perl

src:
  fetch:
    sha256: "afb181a76e1ee72832f6581c0eddf8df032b83e2e0239ef79ebedc4467d92d6e"
    url: "https://ftpmirror.gnu.org/gnu/autoconf/autoconf-2.72.tar.gz"
    mirrors:
      - "https://ftp.gnu.org/gnu/autoconf/autoconf-2.72.tar.gz"

build:
  system: autotools
  configure_args:
    - "--prefix=${PREFIX}"