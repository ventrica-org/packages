meta:
  name: "curl"
  version: "8.18.0"
  description: "Command line tool for transferring files with URL syntax"
  license: "curl"
  homepage: "https://curl.se/"
  category: "networking"

deps:
  build:
    - pkgconf
    - gnumake
  run:
    - openssl_3
    - libnghttp2
    - libssh2

src:
  fetch:
    sha256: "40df79166e74aa20149365e11ee4c798a46ad57c34e4f68fd13100e2c9a91946"
    url: "https://curl.se/download/curl-8.18.0.tar.xz"

build:
  system: shell
  run: |
    ./configure \
      --prefix=${PREFIX} \
      --enable-versioned-symbols \
      --disable-manual \
      --disable-silent-rules \
      --with-ssl \
      --with-ca-fallback \
      --with-default-ssl-backend=openssl \
      --with-gssapi \
      --with-nghttp2 \
      --with-libssh2 \
      --with-ca-bundle=/etc/ssl/cert.pem \
      --without-ca-path \
      --without-libpsl \
      --disable-ldap \
      --disable-ldaps \
      --disable-ares \
      --without-zstd \
      --without-brotli \
      --without-nghttp3 \
      --without-ngtcp2
    make
    make install DESTDIR=${DESTDIR}
    mkdir -p "${DESTDIR}/share/man/man1"
    make -C scripts install DESTDIR=${DESTDIR}
