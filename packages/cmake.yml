meta:
  name: "cmake"
  version: "4.3.0"
  description: "Cross-platform make"
  license: "BSD-3-Clause"
  homepage: "https://www.cmake.org/"
  category: "developer"

deps:
  build:
    - gnumake
  run:
    - ncurses
    - libidn2

src:
  fetch:
    sha256: "f51b3c729f85d8dde46a92c071d2826ea6afb77d850f46894125de7cc51baa77"
    url: "https://github.com/Kitware/CMake/releases/download/v4.3.0/cmake-4.3.0.tar.gz"
    mirrors:
      - "http://fresh-center.net/linux/misc/cmake-4.3.0.tar.gz"
      - "http://fresh-center.net/linux/misc/legacy/cmake-4.3.0.tar.gz"

build:
  system: make
  pre_configure: "./bootstrap --prefix=${prefix} --no-system-libs --datadir=${prefix}/share/cmake --docdir=${prefix}/share/doc/cmake --mandir=${prefix}/share/man"
