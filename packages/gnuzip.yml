meta:
  name: "gnuzip"
  version: "1.14"
  description: "GNU zip archiving utility"
  license: "GPL-3.0"
  homepage: "https://www.gnu.org/software/gzip/"
  category: "archiving"

deps:
  build:
    - automake
    - autoconf
    - gettext
    - gnumake

src:
  fetch:
    sha256: "613d6ea44f1248d7370c7ccdeee0dd0017a09e6c39de894b3c6f03f981191c6b"
    url: "https://ftpmirror.gnu.org/gnu/gzip/gzip-1.14.tar.gz"

build:
  system: autotools
  configure_args:
    - "--prefix=${prefix}"
    - "--disable-dependency-tracking"