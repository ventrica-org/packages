meta:
  name: "gawk"
  version: "5.4.0"
  description: "GNU awk utility"
  license: "GPL-3.0"
  homepage: "https://www.gnu.org/software/gawk/"
  category: "developer"

deps:
  build:
    - gnumake
  run:
    - gmp
    - gettext
    - mpfr
    - readline

src:
  fetch:
    sha256: "3dd430f0cd3b4428c6c3f6afc021b9cd3c1f8c93f7a688dc268ca428a90b4ac1"
    url: "https://ftp.gnu.org/gnu/gawk/gawk-5.4.0.tar.xz"
    mirrors:
      - "https://ftpmirror.gnu.org/gnu/gawk/gawk-5.4.0.tar.xz"

build:
  system: autotools
  configure_args:
    - "--prefix=${PREFIX}"
    - "--disable-silent-rules"
    - "--without-libsigsegv-prefix"
