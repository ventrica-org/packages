meta:
  name: "ncurses"
  version: "6.6"
  description: "A library for controlling writing to the console"
  license: "MIT"
  homepage: "https://invisible-island.net/ncurses/"
  category: "libraries"

deps:
  build:
    - gnumake

src:
  fetch:
    sha256: "355b4cbbed880b0381a04c46617b7656e362585d52e9cf84a67e2009b749ff11"
    url: "https://ftp.gnu.org/gnu/ncurses/ncurses-6.6.tar.gz"
    mirrors:
      - "https://ftpmirror.gnu.org/gnu/ncurses/ncurses-6.6.tar.gz"

build:
  system: shell
  run: |
    ./configure \
      --prefix=${PREFIX} \
      --enable-pc-files \
      --with-pkg-config-libdir=${PREFIX}/lib/pkgconfig \
      --enable-sigwinch \
      --enable-symlinks \
      --enable-widec \
      --with-shared \
      --with-cxx-shared \
      --with-gpm=no \
      --without-ada
    make
    make install DESTDIR=${DESTDIR}
    ln -sf libncurses.a ${DESTDIR}${PREFIX}/lib/libcurses.a
    ln -sf ncursesw.pc ${DESTDIR}${PREFIX}/lib/pkgconfig/ncurses.pc
    ln -sf formw.pc ${DESTDIR}${PREFIX}/lib/pkgconfig/form.pc
    ln -sf menuw.pc ${DESTDIR}${PREFIX}/lib/pkgconfig/menu.pc
    ln -sf panelw.pc ${DESTDIR}${PREFIX}/lib/pkgconfig/panel.pc
