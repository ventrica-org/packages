meta:
  name: "gdbm"
  version: "1.26"
  description: "GNU database manager"
  license: "GPL-3.0"
  homepage: "https://www.gnu.org/software/gdbm/"
  category: "libraries"

deps:
  build:
    - gnumake

src:
  fetch:
    sha256: "6a24504a14de4a744103dcb936be976df6fbe88ccff26065e54c1c47946f4a5e"
    url: "https://ftp.gnu.org/gnu/gdbm/gdbm-1.26.tar.gz"
    mirrors:
      - "https://ftpmirror.gnu.org/gnu/gdbm/gdbm-1.26.tar.gz"

build:
  system: shell
  run: |
    ./configure \
      --prefix=${PREFIX} \
      --disable-silent-rules \
      --enable-libgdbm-compat \
      --without-readline
    make
    make install DESTDIR=${DESTDIR}
    mv ${DESTDIR}${PREFIX}/include/ndbm.h ${DESTDIR}${PREFIX}/include/gdbm-ndbm.h
