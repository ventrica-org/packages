meta:
  name: "gettext"
  version: "1.0"
  description: "GNU gettext utilities"
  license: "GPL-3.0-or-later"
  homepage: "https://www.gnu.org/software/gettext/"
  category: "developer"

deps:
  run:
    - libunistring
  build:
    - gnumake


src:
  fetch:
    sha256: "85d99b79c981a404874c02e0342176cf75c7698e2b51fe41031cf6526d974f1a"
    url: "https://ftpmirror.gnu.org/gnu/gettext/gettext-1.0.tar.gz"

build:
  env:
    am_cv_func_iconv_works: "yes"
  system: autotools
  configure_args:
    - "--prefix=${PREFIX}"
  # - "--with-libunistring-prefix=???"
    - "--disable-silent-rules"
    - "--with-included-glib"
    - "--with-included-libcroco"
    - "--with-emacs"
    - "--disable-java"
    - "--disable-csharp"
    - "--without-git"
    - "--without-cvs"
    - "--without-xz"
    # mac specific
    - "--with-included-gettext"