meta:
  name: "libtool"
  version: "2.5.4"
  description: "Generic library support script"
  license: "GPL-2.0-or-later"
  homepage: "https://www.gnu.org/software/libtool/"
  category: "developer"

deps:
  build:
    - gnumake
  run:
    - m4

src:
  fetch:
    sha256: "da8ebb2ce4dcf46b90098daf962cffa68f4b4f62ea60f798d0ef12929ede6adf"
    url: "https://ftp.gnu.org/pub/gnu/libtool/libtool-2.5.4.tar.gz"
    mirrors:
      - "https://ftpmirror.gnu.org/gnu/libtool/libtool-2.5.4.tar.gz"

build:
  system: autotools
  configure_args:
    - "--prefix=${PREFIX}"
    - "--disable-silent-rules"
    - "--enable-ltdl-install"