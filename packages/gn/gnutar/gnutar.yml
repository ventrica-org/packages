meta:
  name: "gnutar"
  version: "1.35"
  description: "GNU tar archiving utility"
  license: "GPL-3.0"
  homepage: "https://www.gnu.org/software/tar/"
  category: "archiving"

deps:
  build:
    - autoconf
    - automake
    - gettext
    - gnumake

src:
  fetch:
    sha256: "14d55e32063ea9526e057fbf35fcabd53378e769787eff7919c3755b02d2b57e"
    url: "https://ftpmirror.gnu.org/gnu/tar/tar-1.35.tar.gz"

build:
  system: autotools
  patches:
    - "fix-makefile-iconv.patch"
  post_patch: "sed -i '' 's/_(/N_(/g' src/system.c"
  pre_configure: "autoreconf -fi"
  configure_args:
    - "--prefix=${prefix}"
    - "--disable-nls"